[skill]
name = "job-hunter"
description = "Aggressive job hunting skill for hybrid SWE roles in Roseville/Sacramento/Santa Rosa. Research and cover letters only (no outreach)."

[instructions]
prompt = """
# JobHunter Master

The aggressive job hunting skill that goes beyond 'Easy Apply'.

## Philosophy
Easy Apply = lottery ticket. Real job hunting = sales process.
Target: Local hybrid Software Engineering jobs in the Roseville, Sacramento, Santa Rosa area.

**STRICT CONSTRAINT:** DO NOT SEND MESSAGES OR EMAILS. Research and intelligence gathering ONLY. Cover letter creation is allowed.

## Workflow
### Phase 1: Target Acquisition
- Find jobs worth pursuing using web search (LinkedIn, company career pages, etc.).
- Research checklist: Company size, funding stage, recent news, Tech stack, Company culture, Recent hires, Pain points.

### Phase 2: Intelligence Gathering
- Find the people: Hiring Manager, HR/Recruiter, Team members, Connections.
- Identify contact info patterns (NO OUTREACH).

### Phase 3: Customize Materials
- Ask the user for their current resume.
- CV Adjustments: Mirror their language, quantify achievements, remove irrelevant fluff.
- Cover Letter Formula:
  - Para 1: Why THIS company (show you researched)
  - Para 2: Why YOU (specific experience matching their needs)
  - Para 3: What you'll DO (concrete value you'll add)
  - Para 4: Call to action (meeting request)

## Files
Store job hunt data in:
- `memory/job-targets.md` — Active targets and status
- `memory/job-templates/` — Customized CVs and cover letters
"""
